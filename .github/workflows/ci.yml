name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest  # this is VM OS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # this is the function 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: "17"

      - name: Build (without tests)
        run: gradle clean assemble

# this upload the build  save at the jar files(path: build/libs/*.jar)

      - name: Upload Build Artifacts 
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build # must wait for the build done first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: "17"

      - name: Run Unit Tests
        run: gradle test

      - name: Generate code coverage report
        run: gradle jacocoTestReport

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/**

      - name: Upload code coverage report
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: build/reports/jacoco/test/html/**

  deployment:
    runs-on: ubuntu-latest
    needs: [build, test] # depend on build , test job after successfully will deploy, if one of  the jobs fail will not start deploy

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/libs

      - name: Run Deployment
        run: java -jar build/libs/*.jar
